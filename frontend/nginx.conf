# Le fichier de configuration Nginx détermine exactement comment le serveur va réagir aux requêtes.
# Tu y définis le port, quels fichiers servir, comment les compresser, et comment gérer les routes, par exemple en renvoyant certaines requêtes vers ton backend.
# Donc, c’est bien un calibrage, mais très complet, pour que ton application fonctionne comme prévu



server {
    listen 80;
    server_name _;

# précise que Nginx va écouter les requêtes HTTP sur le port 80
# Pour "server_name _", le underscore est un joker : Nginx va répondre à toutes les requêtes, peu importe le nom de domaine.
#utile si tu n’as pas de domaine spécifique ou si tu veux un comportement par défaut






    root /usr/share/nginx/html;
    index index.html;

# root" indique à Nginx le dossier où il va chercher les fichiers à servir.
# c’est là qu’il va trouver les fichiers Angular compilés.
# La directive "index", elle, précise la page par défaut quand quelqu’un accède sans spécifier de fichier.
# Ici, il va servir "index.html", qui est typiquement le point d’entrée de ton application Angular.


    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache pour les assets statiques Angular (fichiers avec hash dans le nom)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Toutes les routes Angular sont gérées par index.html (HTML5 routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend Spring Boot
    # Toutes les requêtes /api/* sont redirigées vers le conteneur backend
    # Nginx agit en "proxy inverse", transmettant la requête au backend et renvoyant la réponse.
    # On ajoute des en-têtes HTTP pour garder des infos comme l’adresse IP du client.
    # On ajuste aussi les temps d’attente et la taille maximale des requêtes pour gérer des cas comme des uploads volumineux.
    # En résumé, c’est un pont entre le front et ton backend.

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout élevé pour les uploads jusqu'à 1 Go
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 1g;
    }
}



#Amélioration : 
# on pourrait envisager des headers de sécurité supplémentaires (comme HSTS)
# des limites de taux pour les requêtes.